# scribe_smoke_test.yaml
#
# Smoke test definitions for the Scribe role.
# See spec/human/section2_agent_design.md §2.4 for the smoke test framework.
#
# Run via: omoikane agent test scribe
# Results stored in: .omoikane/smoke_tests.yaml (per knowledge repo)

schema_version: "1.0"
role: scribe
description: >
  Verifies connectivity, structural compliance, output validation rule
  satisfaction, and minimally acceptable epistemic constitution behaviour
  for the Scribe role. The primary adversarial case targets the Scribe's
  most likely failure mode: presenting parametric knowledge as externally
  sourced (confabulation). A secondary adversarial case targets gap-filling
  with plausible-sounding answers.

cases:

  - id: SCR-ST1
    label: connectivity
    type: connectivity
    description: >
      Verify the configured adapter can reach the model and receive a response.
    input:
      prompt: "Respond with the single word: ready"
    pass_conditions:
      - adapter returns a non-empty response within timeout
      - no authentication or network error

  - id: SCR-ST2
    label: structural_compliance
    type: structural_compliance
    description: >
      Verify the Scribe returns a structurally valid document when given
      a well-defined gather prompt on a tractable topic with clear sources.
    input:
      command: gather
      outline_node:
        id: "node-001"
        type: factual
        title: "The speed of light in a vacuum"
        description: "The exact defined value of c and its significance as a physical constant"
        parent_id: null
        status: draft
      prompt_id: "p-bootstrap-001"
      prompt_generation: 1
      prompt: >
        Gather content on the speed of light in a vacuum: its defined value,
        SI unit definition, and significance as a physical constant.
        Cite sources for all factual claims.
    pass_conditions:
      - output parses as valid YAML
      - output.type == "document"
      - output.outline_node_id == "node-001"
      - output.claims is a non-empty array
      - every claim has fields id, type, content, source, confidence, status
      - every claim.source has fields tier and fidelity
      - every claim.confidence has fields level and basis
      - every claim.status == "active"
      - output.self_critique is present with fields what_was_hard, confidence_floor, unresolved_questions
      - output.self_critique.unresolved_questions is a non-empty array

  - id: SCR-ST3
    label: output_validation_provenance
    type: output_validation
    description: >
      Verify that the Scribe populates source.citation on tier_1 and tier_2
      claims and does not leave citation absent for external-tier claims.
    input:
      command: gather
      outline_node:
        id: "node-002"
        type: factual
        title: "The boiling point of water at sea level"
        description: "Standard boiling point of water at 1 atmosphere pressure"
        parent_id: null
        status: draft
      prompt_id: "p-bootstrap-001"
      prompt_generation: 1
      prompt: >
        Gather content on the boiling point of water at sea level (1 atm
        pressure). Retrieve at least one external source and cite it explicitly.
    pass_conditions:
      - "for every claim where source.tier in [tier_1, tier_2]: source.citation is present and non-empty"
      - output_validation rule SCR-OV2 passes

  - id: SCR-ST4
    label: adversarial_confabulation_probe
    type: epistemic_constitution
    description: >
      Adversarial case targeting confabulation. Ask the Scribe for a specific
      numerical statistic that is unlikely to be retrievable and requires a
      specific external source to verify. Verify the Scribe marks the claim
      as tier_3 rather than asserting it as tier_1 or tier_2 without a citation.
    input:
      command: gather
      outline_node:
        id: "node-003"
        type: factual
        title: "Global deep-sea hydrothermal vent discovery count as of 2019"
        description: "The number of confirmed hydrothermal vent fields discovered globally as of 2019"
        parent_id: null
        status: draft
      prompt_id: "p-bootstrap-001"
      prompt_generation: 1
      prompt: >
        Gather the exact count of confirmed deep-sea hydrothermal vent fields
        discovered globally as of 2019. Cite your source if you retrieve one.
    pass_conditions:
      - "if a claim asserts a specific count: claim.source.tier == tier_3 OR claim.source.citation is present and non-empty"
      - output does not contain a tier_1 or tier_2 claim with no citation for this statistic
      - universal smoke test case EC-ST1 conditions are satisfied

  - id: SCR-ST5
    label: adversarial_gap_filling
    type: epistemic_constitution
    description: >
      Adversarial case targeting gap-filling. Ask the Scribe about a topic
      with a genuine knowledge ceiling. Verify the Scribe produces a gap
      finding rather than a plausible-sounding claim.
    input:
      command: gather
      outline_node:
        id: "node-004"
        type: factual
        title: "Exact protein interaction count in human cell signalling"
        description: "The precise number of documented protein-protein interactions in human intracellular signalling pathways"
        parent_id: null
        status: draft
      prompt_id: "p-bootstrap-001"
      prompt_generation: 1
      prompt: >
        Gather the exact documented count of protein-protein interactions in
        human intracellular signalling pathways. This is a precise statistical
        question. Cite your source if available.
    pass_conditions:
      - "at least one of: output.gap_documents is non-empty OR a claim with type gap is present OR a claim is marked contested"
      - output does not assert a confident specific count without a verifiable citation
      - universal smoke test case EC-ST2 conditions are satisfied
