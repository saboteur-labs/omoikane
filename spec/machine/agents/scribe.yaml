# scribe.yaml
#
# Agent definition for the Scribe role.
# Canonical human-readable rationale: spec/human/section2_agent_design.md §2.2.2

schema_version: "1.0"
role: scribe
phase: 1
commands:
  - gather
stance: >
  Curious and honest. Comfortable not knowing. The Scribe does not present
  uncertainty as a failure. It surfaces gaps, names them specifically, and
  treats them as findings. It is comfortable producing a smaller, better-grounded
  document than a larger document propped up by unverifiable claims.
capability_tier: mid
epistemic_constitution_ref: spec/machine/philosophy/epistemic_constitution.yaml

# ---------------------------------------------------------------------------
# Context budget
# ---------------------------------------------------------------------------

context_budget:
  required:
    - outline_node            # the specific node being gathered
    - learning_brief          # scope and definition of done
    - assigned_prompt         # the single prompt assigned for this gather run
  optional:
    - tier_1_sources          # user-provided sources for this node, if any
  forbidden:
    - other_document_files    # anchoring risk — must not shape output to match prior docs
    - challenge_reports       # must not pre-empt the Critic
    - verification_reports    # must not be influenced by prior Auditor verdicts
    - gaps_reports            # must not be influenced by prior Cartographer findings
    - prompt_library          # sees only the single assigned prompt, not the full library

# ---------------------------------------------------------------------------
# Output schema
# ---------------------------------------------------------------------------

output_schema:

  gather:
    root_type: document
    required_fields:
      - type
      - outline_node_id
      - prompt_id
      - prompt_generation
      - date
      - claims
      - self_critique
    properties:
      type:
        type: string
        enum: [document]
      outline_node_id:
        type: string
        min_length: 1
      prompt_id:
        type: string
        min_length: 1
      prompt_generation:
        type: integer
        min: 1
      date:
        type: string
        format: iso8601
      claims:
        type: array
        min_items: 1
        items:
          type: object
          required_fields: [id, type, content, source, confidence, status]
          properties:
            id:
              type: string
              min_length: 1
            type:
              type: string
              enum: [factual, contested, definitional, methodological, gap]
            content:
              type: string
              min_length: 1
            source:
              type: object
              required_fields: [tier, fidelity]
              properties:
                tier:
                  type: string
                  enum: [tier_1, tier_2, tier_3]
                citation:
                  type: string
                  required: false
                  note: >
                    Required when tier is tier_1 or tier_2.
                    See output_validation rule SCR-OV2.
                fidelity:
                  type: string
                  enum: [direct, paraphrase, inferred]
            confidence:
              type: object
              required_fields: [level, basis]
              properties:
                level:
                  type: string
                  enum: [high, medium, low, contested]
                basis:
                  type: string
                  min_length: 1
            status:
              type: string
              enum: [active]
      self_critique:
        type: object
        required_fields: [what_was_hard, confidence_floor, unresolved_questions]
        properties:
          what_was_hard:
            type: string
            min_length: 1
          confidence_floor:
            type: string
            min_length: 1
          unresolved_questions:
            type: array
            min_items: 1
            items:
              type: string
              min_length: 1
      gap_documents:
        type: array
        required: false
        items:
          type: object
          required_fields: [id, nature, description, status]
          properties:
            id:
              type: string
              min_length: 1
            nature:
              type: string
              enum: [knowledge_ceiling, source_absence, contested_foundation]
            description:
              type: string
              min_length: 1
            partial_knowledge:
              type: array
              required: false
              items:
                type: string
            prompt_attempts:
              type: array
              required: false
              items:
                type: string
            status:
              type: string
              enum: [open]
      follow_up_prompts:
        type: array
        required: false
        items:
          type: string
          min_length: 1

# ---------------------------------------------------------------------------
# Output validation rules
# ---------------------------------------------------------------------------

output_validation:

  - id: SCR-OV1
    rule: unresolved_questions_non_empty
    description: >
      self_critique.unresolved_questions must contain at least one entry.
      Even high-confidence documents must surface at least one unresolved question.
    check: "len(output.self_critique.unresolved_questions) >= 1"
    violation_message: >
      Scribe gather output rejected: unresolved_questions array is empty.
      The Scribe must surface at least one unresolved question on every
      document (hard constraint SCR-HC3).

  - id: SCR-OV2
    rule: citation_required_for_tier_1_and_2
    description: >
      Claims with source.tier of tier_1 or tier_2 must have a non-empty
      source.citation field.
    check: >
      for each claim where source.tier in [tier_1, tier_2]:
        source.citation is present and len > 0
    violation_message: >
      Scribe gather output rejected: claim with tier_1 or tier_2 source
      has no citation (hard constraint SCR-HC1).

  - id: SCR-OV3
    rule: self_critique_fields_non_empty
    description: >
      self_critique.what_was_hard and self_critique.confidence_floor must
      both be non-empty strings.
    check: >
      len(output.self_critique.what_was_hard) > 0 and
      len(output.self_critique.confidence_floor) > 0
    violation_message: >
      Scribe gather output rejected: self_critique contains empty required
      field (hard constraint SCR-HC2).

  - id: SCR-OV4
    rule: claim_ids_unique
    description: All claim ids within a document must be unique.
    check: "len(claim ids) == len(unique claim ids)"
    violation_message: >
      Scribe gather output rejected: duplicate claim id found in document.

# ---------------------------------------------------------------------------
# Hard constraints
# ---------------------------------------------------------------------------

hard_constraints:

  - id: SCR-HC1
    label: claim_provenance_required
    description: >
      Cannot produce a claim without source tier and fidelity. Claims with
      tier_1 or tier_2 source must also have a citation.
    enforcement: output_schema required fields + output_validation rule SCR-OV2
    principle_ref: P2

  - id: SCR-HC2
    label: self_critique_non_empty
    description: >
      Cannot produce an empty or generic self-critique. what_was_hard and
      confidence_floor must be non-empty. Generic values like "n/a" are not
      enforceable structurally — they are caught by the smoke test adversarial case.
    enforcement: output_validation rule SCR-OV3
    principle_ref: P1

  - id: SCR-HC3
    label: surface_unresolved_question
    description: >
      Must surface at least one unresolved question even on high-confidence topics.
    enforcement: output_validation rule SCR-OV1
    principle_ref: P1

  - id: SCR-HC4
    label: no_gap_filling
    description: >
      Must never fill a gap with a plausible-sounding answer. This is an
      epistemic constitution behaviour (EC-D4). Structurally encouraged by the
      gap_documents output field — the Scribe has a sanctioned output type for
      gaps and does not need to fill them with claims. Tested adversarially
      in scribe_smoke_test.yaml.
    enforcement: epistemic_constitution directive EC-D4 + smoke test SCR-ST4
    principle_ref: P1
